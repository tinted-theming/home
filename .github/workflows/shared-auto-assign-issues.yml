name: "Auto assignment for issues"

on:
  workflow_call:
    secrets:
      token:
        description: "GitHub Access Token"
        required: true
    inputs:
      codeowners:
        description: "Github Codeowners team"
        type: "string"
        required: false

jobs:
  auto-assign:
    runs-on: "ubuntu-latest"
    permissions:
      issues: "write"
    outputs:
      codeowners: ${{ steps.codeowners.outputs.value }}
    steps:
      - name: "Check token value"
        run: |
          token="${{ secrets.token }}"
          if [ -z "$token" ]; then
            echo "'secrets.token' not provided."
            exit 1
          fi

      - uses: actions/checkout@9a9194f87191a7e9055e3e9b95b8cfb13023bb08 # v4.1.7
      - name: "Get teams from CODEOWNERS file"
        id: "codeowners"
        run: |
          result="${{ inputs.codeowners }}"
          first_item=true

          if [ -z "$result" ]; then
            while IFS= read -r line; do
              if [ "$first_item" = true ]; then
                result="${line#* @tinted-theming/}"
                first_item=false
              else
                result="$result, ${line#* @tinted-theming/}"
              fi
            done < .github/CODEOWNERS

            if [ -z "$result" ]; then
              echo "Error: unable to determine teams from .github/CODEOWNERS file"
              exit 1
            fi
          fi

          echo "value=$result" >> $GITHUB_OUTPUT

      - name: "Auto-assign issue"
        uses: "pozil/auto-assign-issue@21ffb634481e75f2557e5f507e359cba97bbc42b" # v2.2.0
        with:
          repo-token: "${{ secrets.token }}"
          teams: "${{ steps.codeowners.outputs.value }}"
          numOfAssignee: 3
